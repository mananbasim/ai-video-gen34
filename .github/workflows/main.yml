name: Generate AI Video Automation

# Isse aap GitHub Actions tab mein ja kar khud button daba kar run kar sakte hain
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub se aapka sara code machine mein copy karna
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Python install karna
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Zaroori library install karna
      - name: Install Dependencies
        run: |
          pip install gradio_client

      # 4. Aapki Python script (run_ai.py) ko run karna
      - name: Run AI Script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # Ye aapka secret token use karega
        run: python run_ai.py

      # 5. Video banne ke baad usay download ke liye available karna
      - name: Upload Video Artifact
        if: always() # Agar script fail bhi ho jaye to logs mil saken
        uses: actions/upload-artifact@v4
        with:
          name: ai-generated-video
          path: output_video.mp4
          retention-days: 1 # Video 1 din tak download ke liye rahegi
